name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: JVM unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        # AGP must be loadable for Gradle to configure :app, even when only
        # running :core:* tasks. Pre-installing platform 35 + build-tools 35.0.0
        # avoids on-demand downloads at configure time.
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run unit tests
        id: gradle
        run: |
          set -o pipefail
          ./gradlew :core:domain:test :core:data:test --stacktrace --info 2>&1 | tee /tmp/jvm-tests.log

      - name: Post tail of gradle log on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '_(no log captured)_';
            try {
              const log = fs.readFileSync('/tmp/jvm-tests.log', 'utf8');
              const tail = log.split('\n').slice(-200).join('\n');
              body = '<!-- ci-jvm-tests --> JVM unit tests failed. Last 200 lines:\n\n```\n' + tail + '\n```';
            } catch (e) {
              body = 'JVM unit tests failed before gradle started: ' + e.message;
            }
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
            /tmp/jvm-tests.log
          retention-days: 14

  android-build:
    name: Android debug build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Assemble debug APK
        id: gradle
        run: |
          set -o pipefail
          ./gradlew :app:assembleDebug --stacktrace --info 2>&1 | tee /tmp/android-build.log

      - name: Post tail of gradle log on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '_(no log captured)_';
            try {
              const log = fs.readFileSync('/tmp/android-build.log', 'utf8');
              const tail = log.split('\n').slice(-200).join('\n');
              body = '<!-- ci-android-build --> Android debug build failed. Last 200 lines:\n\n```\n' + tail + '\n```';
            } catch (e) {
              body = 'Android debug build failed before gradle started: ' + e.message;
            }
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: /tmp/android-build.log
          retention-days: 14

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
