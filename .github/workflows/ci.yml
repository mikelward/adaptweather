name: CI

on:
  # Don't trigger on pushes to feature branches — pull_request covers those.
  # Without this, every commit on a PR branch fires CI twice (once for `push`
  # to the branch, once for `pull_request`), and the two runs race on the
  # shared Gradle cache so one frequently fails while the other passes.
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: JVM unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          # `app/build.gradle.kts` derives `versionCode` from
          # `git rev-list --count HEAD`. Shallow clones return 1 every time,
          # so every build would collide on versionCode 1.
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        # AGP must be loadable for Gradle to configure :app, even when only
        # running :core:* tasks. Pre-installing platform 35 + build-tools 35.0.0
        # avoids on-demand downloads at configure time.
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run unit tests
        id: gradle
        run: |
          set -o pipefail
          ./gradlew :core:domain:test :core:data:test :app:testDebugUnitTest --stacktrace --info 2>&1 | tee /tmp/jvm-tests.log

      - name: Clear prior CI comments for this job
        # Runs on both pass and fail. A green run on a fix commit removes the
        # earlier failure comment, so the PR conversation doesn't accumulate
        # stale stack traces every time someone pushes a typo and then fixes it.
        # Skipped on cancellation so a manually-cancelled run doesn't wipe the
        # comment from a still-real failure.
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- ci-jvm-tests -->';
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            for (const c of comments) {
              if (c.user.type === 'Bot' && c.body && c.body.includes(marker)) {
                await github.rest.issues.deleteComment({
                  ...context.repo,
                  comment_id: c.id,
                });
              }
            }

      - name: Post tail of gradle log on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '/tmp/jvm-tests.log';
            let body = '_(no log captured)_';
            try {
              const log = fs.readFileSync(path, 'utf8');
              const lines = log.split('\n');
              const errorLines = lines.filter(l =>
                /^(e:|w:| {2}error:|FAILURE:|\* What went wrong:|Caused by:|Compilation error)/.test(l)
              ).slice(0, 80);
              const tail = lines.slice(-300).join('\n');
              body = '<!-- ci-jvm-tests --> JVM unit tests failed.\n\n' +
                '### Likely error lines\n```\n' + (errorLines.join('\n') || '(none matched)') + '\n```\n' +
                '### Last 300 lines\n```\n' + tail + '\n```';
            } catch (e) {
              body = 'JVM unit tests failed before gradle started: ' + e.message;
            }
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
            /tmp/jvm-tests.log
          retention-days: 14

  android-build:
    name: Android debug build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          # See unit-tests job above — versionCode comes from rev-list --count.
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Decode debug keystore from secret
        # Stable signing identity across CI builds so the installed app upgrades
        # in place instead of failing "App not installed (signature mismatch)"
        # on every new APK. If the secret isn't set (e.g. a PR from a fork
        # without secret access, or a fresh repo before the secret is added),
        # the step quietly no-ops and AGP falls back to its auto-generated
        # debug keystore — the build still works, you just lose in-place
        # upgrades on the next install.
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$DEBUG_KEYSTORE_BASE64" ]; then
            echo "No DEBUG_KEYSTORE_BASE64 secret available; build will use AGP-default debug keystore."
            exit 0
          fi
          # printf rather than echo: portable across shells and doesn't append
          # a trailing newline that some base64 implementations choke on.
          printf '%s' "$DEBUG_KEYSTORE_BASE64" | base64 --decode > /tmp/debug.keystore
          # Validate the decoded file is actually a usable PKCS12/JKS keystore
          # with the configured password, rather than just non-empty bytes.
          # Catches "wrong base64", "wrong password", "uploaded a JPEG by
          # mistake" — at the early-fail step, not at signing-step time.
          if ! keytool -list -keystore /tmp/debug.keystore -storepass "$DEBUG_KEYSTORE_PASSWORD" >/dev/null 2>&1; then
            echo "::error::Decoded keystore at /tmp/debug.keystore is not a valid keystore or password is wrong."
            exit 1
          fi
          echo "DEBUG_KEYSTORE_FILE=/tmp/debug.keystore" >> "$GITHUB_ENV"

      - name: Assemble debug APK
        id: gradle
        env:
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}
          DEBUG_KEY_PASSWORD: ${{ secrets.DEBUG_KEY_PASSWORD }}
        run: |
          set -o pipefail
          ./gradlew :app:assembleDebug --stacktrace --info 2>&1 | tee /tmp/android-build.log

      - name: Clear prior CI comments for this job
        # Same rationale as the JVM job — drops stale failure comments on a
        # clean re-run so the PR doesn't accumulate.
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- ci-android-build -->';
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            for (const c of comments) {
              if (c.user.type === 'Bot' && c.body && c.body.includes(marker)) {
                await github.rest.issues.deleteComment({
                  ...context.repo,
                  comment_id: c.id,
                });
              }
            }

      - name: Post tail of gradle log on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '_(no log captured)_';
            try {
              const log = fs.readFileSync('/tmp/android-build.log', 'utf8');
              const lines = log.split('\n');
              const errorLines = lines.filter(l =>
                /^(e:|w:| {2}error:|FAILURE:|\* What went wrong:|Caused by:|Compilation error)/.test(l)
              ).slice(0, 80);
              const tail = lines.slice(-300).join('\n');
              body = '<!-- ci-android-build --> Android debug build failed.\n\n' +
                '### Likely error lines\n```\n' + (errorLines.join('\n') || '(none matched)') + '\n```\n' +
                '### Last 300 lines\n```\n' + tail + '\n```';
            } catch (e) {
              body = 'Android debug build failed before gradle started: ' + e.message;
            }
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: /tmp/android-build.log
          retention-days: 14

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Distribute via Firebase App Distribution
        # On push to main only — feature-branch CI runs would otherwise spam
        # testers with WIP builds. Skipped when secrets aren't set so the build
        # still finishes on a fresh repo / fork.
        if: |
          success() &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          env.FIREBASE_APP_ID != '' &&
          env.FIREBASE_SERVICE_ACCOUNT_JSON != ''
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          # Tester group must exist in Firebase App Distribution console — see
          # docs/firebase-app-distribution.md. "testers" is the convention; rename
          # there + here together if you change it.
          groups: testers
          file: app/build/outputs/apk/debug/app-debug.apk
          # Push notification on the tester's phone shows the first ~60 chars
          # of these notes, so put the most useful info first. Commit subject
          # is normally that.
          releaseNotes: |
            ${{ github.event.head_commit.message }}
            ---
            Build: ${{ github.run_number }} · ${{ github.sha }}
