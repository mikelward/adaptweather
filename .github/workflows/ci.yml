name: CI

on:
  # Don't trigger on pushes to feature branches — pull_request covers those.
  # Without this, every commit on a PR branch fires CI twice (once for `push`
  # to the branch, once for `pull_request`), and the two runs race on the
  # shared Gradle cache so one frequently fails while the other passes.
  push:
    branches: [main]
  pull_request:
  # Manual rescue trigger so the release-AAB / Firebase / Play-upload steps
  # can be re-fired when the natural `push` event didn't produce a usable
  # build (e.g. a transient gradle / Play API failure on the original
  # push-to-main run). Run from Actions tab → CI → "Run workflow",
  # target `main`.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: JVM unit tests
    runs-on: ubuntu-latest
    permissions:
      # contents: write so the snapshot-commit step can push regenerated PNGs
      # back to the PR branch. GITHUB_TOKEN-authored commits do not trigger new
      # workflow runs (GitHub safety mechanism), so there's no infinite loop.
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          # `app/build.gradle.kts` derives `versionCode` from
          # `git rev-list --count HEAD`. Shallow clones return 1 every time,
          # so every build would collide on versionCode 1.
          fetch-depth: 0
          # Check out the PR's actual head ref (not the merge commit's detached
          # HEAD) so the snapshot-commit step below can `git push` back to it.
          # Falls back to the default ref outside PRs (push-to-main runs).
          ref: ${{ github.event.pull_request.head.ref || github.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        # AGP must be loadable for Gradle to configure :app, even when only
        # running :core:* tasks. Pre-installing platform 35 + build-tools 35.0.0
        # avoids on-demand downloads at configure time.
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run unit tests
        id: gradle
        run: |
          set -o pipefail
          ./gradlew :core:domain:test :core:data:test :app:testDebugUnitTest --stacktrace --info 2>&1 | tee /tmp/jvm-tests.log

      - name: Clear prior CI comments for this job
        # Runs on both pass and fail. A green run on a fix commit removes the
        # earlier failure comment, so the PR conversation doesn't accumulate
        # stale stack traces every time someone pushes a typo and then fixes it.
        # Skipped on cancellation so a manually-cancelled run doesn't wipe the
        # comment from a still-real failure.
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- ci-jvm-tests -->';
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            for (const c of comments) {
              if (c.user.type === 'Bot' && c.body && c.body.includes(marker)) {
                await github.rest.issues.deleteComment({
                  ...context.repo,
                  comment_id: c.id,
                });
              }
            }

      - name: Post tail of gradle log on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '/tmp/jvm-tests.log';
            let body = '_(no log captured)_';
            try {
              const log = fs.readFileSync(path, 'utf8');
              const lines = log.split('\n');
              const errorLines = lines.filter(l =>
                /^(e:|w:| {2}error:|FAILURE:|\* What went wrong:|Caused by:|Compilation error)/.test(l)
              ).slice(0, 80);
              const tail = lines.slice(-300).join('\n');
              body = '<!-- ci-jvm-tests --> JVM unit tests failed.\n\n' +
                '### Likely error lines\n```\n' + (errorLines.join('\n') || '(none matched)') + '\n```\n' +
                '### Last 300 lines\n```\n' + tail + '\n```';
            } catch (e) {
              body = 'JVM unit tests failed before gradle started: ' + e.message;
            }
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
            /tmp/jvm-tests.log
          retention-days: 14

      - name: Commit regenerated UI snapshots back to PR branch
        # Roborazzi renders every @Preview to PNG under app/snapshots/
        # (a tracked path). When a UI change shifts pixels, this step commits
        # the new PNGs back to the PR branch so the diff shows up natively in
        # GitHub's "Files changed" image view — no artifact download needed.
        #
        # Same-repo PRs only: forks don't have token write access to the head
        # repo, so the conditional skips them (the artifact upload below is
        # the fallback there). The step is also skipped on push-to-main, where
        # there's no PR branch to update.
        #
        # Loop safety: GITHUB_TOKEN-authored commits don't trigger new workflow
        # runs, and the `git diff --quiet` check no-ops when nothing changed,
        # so reruns and identical re-records don't create empty churn commits.
        # That's why the commit message below intentionally does NOT carry
        # `[skip ci]`: GITHUB_TOKEN already prevents the PR-branch loop, and
        # adding `[skip ci]` would only cause harm — when the snapshot-regen
        # commit ends up as the head of a rebase-merge to `main`, GitHub
        # natively skips the push-to-main run on `[skip ci]`, and the
        # release-AAB / Firebase / Play-upload steps never fire for that SHA.
        #
        # Records SNAPSHOT_COMMIT_SHA / SNAPSHOTS_REGENERATED into the env so
        # the freshness-comment step downstream can report what happened.
        id: snapshot_commit
        if: >-
          success() &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if [ -d app/snapshots ]; then
            # Remove PNGs for deleted or renamed @Test methods (orphaned snapshots).
            # The expected set is the @Test method names in PreviewSnapshots.kt, since
            # captureRoboImage uses testName.methodName as the output filename.
            snapshots_test="app/src/test/kotlin/app/clothescast/ui/today/PreviewSnapshots.kt"
            expected=$(grep -oP '(?<=@Test fun )\w+' "$snapshots_test")
            for png in app/snapshots/*.png; do
              [ -f "$png" ] || continue
              name=$(basename "$png" .png)
              if ! echo "$expected" | grep -qxF "$name"; then
                rm "$png"
                echo "Removed orphaned snapshot: $name.png"
              fi
            done
            # Stage new files, modifications, AND deletions.
            git add -A app/snapshots
          fi
          if git diff --cached --quiet; then
            echo "No snapshot changes."
            echo "SNAPSHOTS_REGENERATED=false" >> "$GITHUB_ENV"
            echo "SNAPSHOT_COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
            exit 0
          fi
          git commit -m "ci: regenerate UI snapshots"
          git push origin HEAD:'${{ github.event.pull_request.head.ref }}'
          echo "SNAPSHOTS_REGENERATED=true" >> "$GITHUB_ENV"
          echo "SNAPSHOT_COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Comment snapshot freshness on PR
        # Sticky comment (single per-PR, updated in place via the marker) so
        # reviewers always know whether the PNGs in the PR's "Files changed"
        # tab are current. Three signals:
        #   - whether *this* run regenerated PNGs (vs reused unchanged ones)
        #   - the head SHA the snapshots were rendered against
        #   - the count of PNGs (catches the silent case where a renamed
        #     @Test method writes to a new file and old PNGs go stale)
        if: >-
          success() &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'app/snapshots';
            let count = 0;
            try {
              count = fs.readdirSync(path).filter(f => f.endsWith('.png')).length;
            } catch (e) {
              // Directory missing — first PR before any snapshot has been
              // recorded. Report 0 so the user sees the situation clearly.
            }
            const headSha = (process.env.SNAPSHOT_COMMIT_SHA || context.sha).slice(0, 7);
            const regenerated = process.env.SNAPSHOTS_REGENERATED === 'true';
            const status = regenerated
              ? `🔄 Regenerated ${count} UI snapshot${count === 1 ? '' : 's'} this run.`
              : `✅ ${count} UI snapshot${count === 1 ? '' : 's'} up-to-date — no pixel changes from this push.`;
            const body = `<!-- ui-snapshots-status -->
            **UI snapshots:** ${status}

            Head: \`${headSha}\` · Browse: [\`app/snapshots/\`](https://github.com/${context.repo.owner}/${context.repo.repo}/tree/${context.payload.pull_request.head.ref}/app/snapshots)`;
            const marker = '<!-- ui-snapshots-status -->';
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload UI preview snapshots (fallback for fork PRs)
        # Same PNGs as the in-repo commit above, kept as a workflow artifact
        # so reviewers on a fork PR (where the commit-back step is skipped
        # for lack of token write access) can still download and eyeball them.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-preview-snapshots
          path: app/snapshots/
          if-no-files-found: ignore
          retention-days: 14

  android-build:
    name: Android debug build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    # workflow_dispatch can be invoked against any ref by any user with
    # `actions: write`. The job-level env block below populates the runner
    # with FIREBASE_* / PLAY_* secrets; without this guard, a manual dispatch
    # against a feature branch that ships a malicious `ci.yml` modification
    # would have those secrets in scope. The publishing steps' own
    # `refs/heads/main` gates aren't enough — they only short-circuit the
    # *publish* steps; the job env vars themselves are still populated for
    # any other step that runs. push and pull_request events are unaffected
    # (push is already filtered to main by the `on:` block; pull_request
    # secrets are blocked by GitHub for fork PRs anyway).
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    # Job-level env: the Firebase distribute step's `if:` reads these via
    # env.FIREBASE_APP_ID / env.FIREBASE_SERVICE_ACCOUNT_JSON. The `secrets`
    # context isn't available in `if:` expressions ("Unrecognized named-value:
    # 'secrets'"); job-level env is. Step-level env is also out of scope when
    # evaluating that same step's `if`, so this must live at the job level.
    env:
      FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v4
        with:
          # See unit-tests job above — versionCode comes from rev-list --count.
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Decode debug keystore from secret
        # Stable signing identity across CI builds so the installed app upgrades
        # in place instead of failing "App not installed (signature mismatch)"
        # on every new APK. If the secret isn't set (e.g. a PR from a fork
        # without secret access, or a fresh repo before the secret is added),
        # the step quietly no-ops and AGP falls back to its auto-generated
        # debug keystore — the build still works, you just lose in-place
        # upgrades on the next install.
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}
          DEBUG_KEY_PASSWORD: ${{ secrets.DEBUG_KEY_PASSWORD }}
        run: |
          if [ -z "$DEBUG_KEYSTORE_BASE64" ]; then
            echo "No DEBUG_KEYSTORE_BASE64 secret available; build will use AGP-default debug keystore."
            exit 0
          fi
          # If one stable-keystore secret is set, all four must be set. Otherwise
          # gradle later errors with "Partial debug-keystore configuration", but
          # the decode step itself would also throw a confusing keytool message
          # in the meantime. Catch it here with an explicit list of what's
          # missing so the failure is unambiguous.
          missing=""
          [ -z "$DEBUG_KEYSTORE_PASSWORD" ] && missing="$missing DEBUG_KEYSTORE_PASSWORD"
          [ -z "$DEBUG_KEY_ALIAS" ]         && missing="$missing DEBUG_KEY_ALIAS"
          [ -z "$DEBUG_KEY_PASSWORD" ]      && missing="$missing DEBUG_KEY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::DEBUG_KEYSTORE_BASE64 is set but the following companion secrets are missing or empty:$missing"
            exit 1
          fi
          # printf rather than echo: portable across shells and doesn't append
          # a trailing newline that some base64 implementations choke on.
          printf '%s' "$DEBUG_KEYSTORE_BASE64" | base64 --decode > /tmp/debug.keystore
          # Validate the decoded file is actually a usable PKCS12/JKS keystore
          # with the configured password, rather than just non-empty bytes.
          # Catches "wrong base64", "wrong password", "uploaded a JPEG by
          # mistake" — at the early-fail step, not at signing-step time.
          if ! keytool -list -keystore /tmp/debug.keystore -storepass "$DEBUG_KEYSTORE_PASSWORD" >/dev/null 2>&1; then
            echo "::error::Decoded keystore at /tmp/debug.keystore is not a valid keystore or DEBUG_KEYSTORE_PASSWORD is wrong."
            exit 1
          fi
          echo "DEBUG_KEYSTORE_FILE=/tmp/debug.keystore" >> "$GITHUB_ENV"

      - name: Assemble debug APK
        id: gradle
        env:
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}
          DEBUG_KEY_PASSWORD: ${{ secrets.DEBUG_KEY_PASSWORD }}
        run: |
          set -o pipefail
          ./gradlew :app:assembleDebug --stacktrace --info 2>&1 | tee /tmp/android-build.log

      - name: Upload debug APK
        # Up here, before the release-AAB steps, so a bundleRelease failure
        # doesn't gate this artifact behind a now-failed `success()`.
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Distribute via Firebase App Distribution
        # On push to main (or manual workflow_dispatch on main) only —
        # feature-branch CI runs would otherwise spam testers with WIP builds.
        # workflow_dispatch is the rescue path when the natural push event
        # was suppressed by `[skip ci]` on the head commit. Skipped when
        # secrets aren't set so the build still finishes on a fresh repo /
        # fork. The env vars referenced here are populated at the job level
        # (see env: block above) — the secrets context isn't allowed in step
        # `if:` and step-level env isn't in scope.
        #
        # Ordered before the release-AAB steps so a bundleRelease failure on
        # main doesn't skip FAD distribution under the `success()` gate — debug
        # testers get the build either way; only the Play AAB artifact is lost.
        if: |
          success() &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
          github.ref == 'refs/heads/main' &&
          env.FIREBASE_APP_ID != '' &&
          env.FIREBASE_SERVICE_ACCOUNT_JSON != ''
        # Pinned to a specific commit SHA (rather than the floating @v1 tag) so
        # a compromised upstream release can't silently swap in malicious code
        # on our next CI run. Bump deliberately. SHA below is wzieba/Firebase-
        # Distribution-Github-Action v1.7.1.
        uses: wzieba/Firebase-Distribution-Github-Action@bd494989dd4bec0343f78adee87fe66e48279ad6 # v1.7.1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          # Tester group must exist in Firebase App Distribution console — see
          # docs/firebase-app-distribution.md. "testers" is the convention; rename
          # there + here together if you change it.
          groups: testers
          file: app/build/outputs/apk/debug/app-debug.apk
          # Push notification on the tester's phone shows the first ~60 chars
          # of these notes, so put the most useful info first. Commit subject
          # is normally that.
          # `head_commit.message` is null on workflow_dispatch (no associated
          # push payload), so fall back to a synthesized subject in that case.
          releaseNotes: |
            ${{ github.event.head_commit.message || format('Manual workflow_dispatch run on {0}', github.sha) }}
            ---
            Build: ${{ github.run_number }} · ${{ github.sha }}

      - name: Decode upload keystore from secret
        # Push-to-main (or manual workflow_dispatch on main) only. PR builds
        # (incl. forks) skip — forks don't have the secret, and even non-fork
        # PRs don't need to burn ~3min signing a release AAB on every commit.
        # Mirrors the debug-keystore decode step above: base64-decode,
        # validate with `keytool -list` so wrong-base64 / wrong-password
        # fails here rather than at signing time, then export the path to
        # GITHUB_ENV for bundleRelease to pick up.
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        env:
          UPLOAD_KEYSTORE_BASE64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
          UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          UPLOAD_KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: |
          if [ -z "$UPLOAD_KEYSTORE_BASE64" ]; then
            echo "::error::UPLOAD_KEYSTORE_BASE64 secret is not set; cannot build a Play-uploadable AAB."
            exit 1
          fi
          missing=""
          [ -z "$UPLOAD_KEYSTORE_PASSWORD" ] && missing="$missing UPLOAD_KEYSTORE_PASSWORD"
          [ -z "$UPLOAD_KEY_ALIAS" ]         && missing="$missing UPLOAD_KEY_ALIAS"
          [ -z "$UPLOAD_KEY_PASSWORD" ]      && missing="$missing UPLOAD_KEY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::UPLOAD_KEYSTORE_BASE64 is set but the following companion secrets are missing or empty:$missing"
            exit 1
          fi
          printf '%s' "$UPLOAD_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/upload.jks"
          if ! keytool -list -keystore "$RUNNER_TEMP/upload.jks" -storepass "$UPLOAD_KEYSTORE_PASSWORD" >/dev/null 2>&1; then
            echo "::error::Decoded keystore at \$RUNNER_TEMP/upload.jks is not a valid keystore or UPLOAD_KEYSTORE_PASSWORD is wrong."
            exit 1
          fi
          echo "UPLOAD_KEYSTORE_FILE=$RUNNER_TEMP/upload.jks" >> "$GITHUB_ENV"

      - name: Bundle release AAB
        # Push-to-main (or manual workflow_dispatch on main) only — see
        # "Decode upload keystore" rationale. Produces
        # app/build/outputs/bundle/release/app-release.aab signed with the upload
        # key; Play App Signing re-signs with the real signing key on download.
        #
        # Both DEBUG_* and UPLOAD_* env vars are passed: Gradle evaluates *all*
        # signingConfigs at configure time, so even though `bundleRelease` only
        # uses the release config, the debug block at app/build.gradle.kts also
        # runs and its partial-config guard would fail the build if DEBUG_*
        # were only partially populated. DEBUG_KEYSTORE_FILE comes via
        # $GITHUB_ENV from the earlier decode step.
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        env:
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}
          DEBUG_KEY_PASSWORD: ${{ secrets.DEBUG_KEY_PASSWORD }}
          UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          UPLOAD_KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: |
          set -o pipefail
          ./gradlew :app:bundleRelease --stacktrace --info 2>&1 | tee -a /tmp/android-build.log

      - name: Upload release AAB
        # Browser-downloadable artifact for manual upload to Play Console — kept
        # even after the auto-upload step below so the AAB is recoverable if the
        # Play upload fails (or for ad-hoc browser uploads to other tracks).
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 14

      - name: Prepare Play release notes
        # Play Console accepts per-locale "what's new" files in a directory,
        # each capped at 500 chars. Write the head-commit subject + build
        # metadata into whatsnew-en-US so internal testers see what changed.
        # Skipped when the Play secret isn't set, so a fresh repo / fork still
        # finishes CI without this step.
        if: |
          success() &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
          github.ref == 'refs/heads/main' &&
          env.PLAY_SERVICE_ACCOUNT_JSON != ''
        env:
          # Pass the commit message via env rather than direct GHA expression
          # interpolation so quotes / backticks in the subject can't break the
          # shell script. Empty on workflow_dispatch (no head_commit payload);
          # the script below falls back to `git log` in that case.
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          RUN_NUMBER: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/whatsnew"
          subject=$(printf '%s\n' "$COMMIT_MESSAGE" | head -n1)
          if [ -z "$subject" ]; then
            subject=$(git log -1 --pretty=%s "$COMMIT_SHA")
          fi
          {
            printf '%s\n\n' "$subject"
            printf 'Build %s · %s\n' "$RUN_NUMBER" "${COMMIT_SHA:0:7}"
          } | head -c 500 > "$RUNNER_TEMP/whatsnew/whatsnew-en-US"

      - name: Upload AAB to Play Store internal track
        # Push-to-main (or manual workflow_dispatch on main) only; skipped
        # when PLAY_SERVICE_ACCOUNT_JSON isn't set so a fresh repo / fork
        # still completes CI. Ordered AFTER the release-AAB artifact upload
        # so a Play API failure (e.g. listing not yet approved, versionCode
        # collision) doesn't gate the artifact behind `success()`. Pinned to
        # the v1.1.5 commit SHA — bump deliberately.
        if: |
          success() &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
          github.ref == 'refs/heads/main' &&
          env.PLAY_SERVICE_ACCOUNT_JSON != ''
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.clothescast
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          # TEMPORARY: `draft` while the app's first Play Console review is
          # pending — the API rejects `completed` releases on a draft app
          # ("Only releases with status draft may be created on draft app"),
          # which fails CI on every push to main. With `draft`, the AAB still
          # uploads to the internal track; activating it requires one click on
          # the "Release to internal testing" button in Play Console per push.
          # Switch back to `completed` once Google approves the listing and
          # the app is no longer in Draft state.
          status: draft
          whatsNewDirectory: ${{ runner.temp }}/whatsnew

      - name: Clear prior CI comments for this job
        # Same rationale as the JVM job — drops stale failure comments on a
        # clean re-run so the PR doesn't accumulate.
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- ci-android-build -->';
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            for (const c of comments) {
              if (c.user.type === 'Bot' && c.body && c.body.includes(marker)) {
                await github.rest.issues.deleteComment({
                  ...context.repo,
                  comment_id: c.id,
                });
              }
            }

      - name: Post tail of gradle log on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '_(no log captured)_';
            try {
              const log = fs.readFileSync('/tmp/android-build.log', 'utf8');
              const lines = log.split('\n');
              const errorLines = lines.filter(l =>
                /^(e:|w:| {2}error:|FAILURE:|\* What went wrong:|Caused by:|Compilation error)/.test(l)
              ).slice(0, 80);
              const tail = lines.slice(-300).join('\n');
              body = '<!-- ci-android-build --> Android debug build failed.\n\n' +
                '### Likely error lines\n```\n' + (errorLines.join('\n') || '(none matched)') + '\n```\n' +
                '### Last 300 lines\n```\n' + tail + '\n```';
            } catch (e) {
              body = 'Android debug build failed before gradle started: ' + e.message;
            }
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: /tmp/android-build.log
          retention-days: 14
